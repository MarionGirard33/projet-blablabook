name: CICD-dev

# à chaque push ce workflow va se lancer
on:
  push:
    branches:
      - dev
      - feat/CICD

jobs:
### FRONT CI ###
  ci-frontend:
    # le job s’exécute sur une machine virtuelle Ubuntu dernière version
    runs-on: ubuntu-latest
    defaults:
      run:
        # va chercher blablabook/frontend
        working-directory: frontend
    steps:
      # clone le repo sur la VM de Github
      - uses: actions/checkout@v4

      # installe Node.js version 20 dans la VM
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Active le cache NPM pour accélérer les builds suivants
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # installe les dépendances du front
      - name: Frontend CI
        run: npm ci


      # génère le dossier dist du front
      - run: npm run build

      # Stocke le build du frontend comme artifact
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist

### BACK CI ###
  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      # Clone repo
      - uses: actions/checkout@v4

      # Node.js setup
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install deps
      - name: Backend ci
        run: npm ci

      # Build backend
      - run: npm run build

      # Build Docker image si besoin
      - run: docker build -t blablabook-back .


### DOCKER CI ###
  ci-docker:
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-backend]

    steps:
      # Clone le repo
      - uses: actions/checkout@v4

      # Vérifie la version de Docker
      - name: Check Docker
        run: docker --version

      # Build et lance les containers
      - name: Build & run docker-compose
        run: docker compose up -d --build

      # Vérifie que les containers tournent
      - name: Docker status
        run: docker compose ps

      # Stop proprement
      - name: Stop containers
        run: docker compose down



