name: CICD-prod

# à chaque push ce workflow va se lancer
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ### FRONT CI ###
  ci-frontend:
    # le job s’exécute sur une machine virtuelle Ubuntu dernière version
    runs-on: ubuntu-latest
    defaults:
      run:
        # va chercher blablabook/frontend
        working-directory: frontend
    steps:
      # clone le repo sur la VM de Github
      - uses: actions/checkout@v5

      # installe Node.js version 20 dans la VM
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          # Active le cache NPM pour accélérer les builds suivants
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # installe les dépendances du front
      - name: Frontend CI
        run: npm ci

      # lance les tests frontend en mode CI (sans watch)
      - name: Run frontend tests
        run: npm run test -- --run

      # génère le coverage frontend
      - name: Run frontend coverage
        run: npm run coverage

      # build du front avec l'URL du back
      - name: Build frontend with backend URL
        run: |
          export VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          npm run build

      # archive les rapports de coverage frontend
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: |
            frontend/coverage
            frontend/coverage.json

      # Sauvegarde le build pour le déploiement
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  ### BACK CI ###
  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      # Clone repo
      - uses: actions/checkout@v5

      # Node.js setup
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install deps
      - name: Backend ci
        run: npm install

      # vérifie le backend avec coverage
      - name: Run backend coverage
        run: npm run test:cov

      # Synch Drizzle Schema to Db supabase
      - name: Push Schema to Supabase
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_URL }}

      # Build backend
      - run: npm run build

      # archive les rapports de coverage backend
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: |
            backend/coverage
            backend/coverage/lcov.info

      # Build Docker image si besoin
      - run: docker build -t blablabook-back .

  ### DOCKER CI ###
  ci-docker:
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-backend]
    defaults:
      run:
        working-directory: .
    env:
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      DATABASE_URL: ${{ secrets.SUPABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FRONTEND_URL_CORS: ${{ secrets.FRONTEND_URL_CORS }}
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
      NODE_ENV: "prod"

    steps:
      # Clone le repo
      - uses: actions/checkout@v5

      # Vérifie la version de Docker
      - name: Check Docker
        run: docker --version

      - name: Start docker compose
        # injecte les env GitHub directement dans le shell
        # le | c'est pour un script multi lignes
        run: docker compose -f docker-compose.prod.yml up -d --build

      # vérifie si on accède à Postgres via le container postgres
      - name: Wait for Postgres
        run: |
          max_attempts=15
          attempt=1
          until docker compose exec -T postgres pg_isready -U "${DB_USER}" -d "${DB_NAME}" >/dev/null 2>&1 || [ $attempt -ge $max_attempts ]; do
            echo "Waiting for Postgres..."
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ $attempt -ge $max_attempts ]; then
            echo "Postgres failed to start in time!"
            docker compose logs postgres
            exit 1
          fi

      # vérifie si le container du back marche bien via http://localhost:3000/health
      - name: Wait for Backend
        run: |
          max_attempts=20
          attempt=1
          until curl -fsS http://localhost:3000/health >/dev/null 2>&1 || [ $attempt -ge $max_attempts ]; do
            echo "Waiting for backend..."
            sleep 2
            attempt=$((attempt + 1))
          done
          if [ $attempt -ge $max_attempts ]; then
            echo "Backend failed to start in time!"
            docker compose logs backend
            exit 1
          fi

      # vérifie que le back répond bien dans le container prod
      - name: Backend smoke check
        run: docker compose exec -T backend curl -fsS http://localhost:3000/health

      # Vérifie que les containers tournent
      - name: Docker status
        run: docker compose ps

      # Stop proprement
      - name: Stop containers
        run: docker compose down

  ### DEPLOY FRONTEND TO SURGE ###
  deploy-frontend:
    needs: ci-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Create 200.html for SPA routing
        run: cp dist/index.html dist/200.html

      - name: Install Surge CLI
        run: npm install -g surge

      - name: Deploy to Surge
        run: surge --project ./dist --domain "${SURGE_DOMAIN}"
        env:
          SURGE_DOMAIN: ${{ secrets.SURGE_DOMAIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

  ### DEPLOY BACKEND TO RENDER ###
  deploy-backend:
    needs: ci-docker
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys
