services:
  # PostgreSQL service
  postgres:
    image: postgres:16-alpine
    environment:
      # Database environment variables
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      # Persist database data
      - pgdata:/var/lib/postgresql/data
      # Initialize database with SQL script
      # - ../init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # In production we avoid exposing Postgres on the host; use internal networking.
    # If you need external access for debugging, add a secure mapping in a separate config.
    # ports:
    #   - "5433:5432"
    restart: unless-stopped
    healthcheck:
      # Check if PostgreSQL is ready to accept connections using the configured DB user
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      start_period: 15s
      interval: 15s
      timeout: 5s
      retries: 5

  # Backend service (NestJS + Drizzle ORM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Database connection variables
      - PGHOST=${DB_HOST}
      - PGUSER=${DB_USER}
      - PGDATABASE=${DB_NAME}
      - PGPASSWORD=${DB_PASSWORD}
      - PGPORT=${DB_PORT}
      # url pour drizzle
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL_CORS=${FRONTEND_URL_CORS}
      - NODE_ENV=${NODE_ENV}
      # Force Node to prefer IPv4 when DNS returns both A and AAAA (fix ENETUNREACH on some hosts)
      - NODE_OPTIONS=--dns-result-order=ipv4first
    ports:
      # Publish backend port to host for direct access (useful behind a reverse-proxy)
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      # Check if backend API is responding on the health endpoint (requires curl in the image)
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    depends_on:
      - postgres

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  # Persistent volume for PostgreSQL data
  pgdata:
