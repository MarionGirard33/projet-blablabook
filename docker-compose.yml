services:
  # PostgreSQL service
  postgres:
    image: postgres:16-alpine
    environment:
      # Database environment variables
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      # Persist database data
      - pgdata:/var/lib/postgresql/data
      # Initialize database with SQL script
      # - ../init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Map host port 5433 to container 5432 for external access
      - "5433:5432"
    healthcheck:
      # Check if Postgres is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U postgres -d blablabook"]
      start_period: 15s
      interval: 15s
      timeout: 5s
      retries: 5

  # Backend service (NestJS + Prisma)
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      # url pour Drizzle
      - DATABASE_URL=${DATABASE_URL}
      # - REDIS_HOST=${REDIS_HOST}
      # - REDIS_PORT=${REDIS_PORT}
    ports:
      # Publish backend port to host for direct access
      - "3000:3000"
    healthcheck:
      # Check if backend API is responding
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    depends_on:
      # Ensure Postgres is healthy before starting backend
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend service (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      # Publish frontend port to host for direct browser access
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Redis service
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  # Persistent volume for PostgreSQL data
  pgdata:
  # Persistent volume for Redis data
  # redisdata:
