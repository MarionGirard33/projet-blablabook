<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Blablabook - Découvrez et partagez vos lectures favoris. Gérez votre bibliothèque personnelle, explorez les meilleures ventes et connectez-vous avec d'autres lecteurs."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="application-name" content="Blablabook" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://blablabook.com" />
    <meta
      property="og:title"
      content="Blablabook - Votre bibliothèque numérique"
    />

      property="og:description"
      content="Découvrez et partagez vos lectures favoris. Gérez votre bibliothèque personnelle et explorez les meilleures sélections."

    <meta property="og:image" content="https://blablabook.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://blablabook.com" />
    <meta
      property="twitter:title"
      content="Blablabook - Votre bibliothèque numérique"
    />
    <meta
      property="twitter:description"
      content="Découvrez et partagez vos lectures favoris."
    />
    <meta
      property="twitter:image"
      content="https://blablabook.com/og-image.jpg"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://blablabook.com" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.blablabook.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"

    />

    <title>
      Blablabook - Votre bibliothèque numérique | Découvrez des livres
    </title>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
